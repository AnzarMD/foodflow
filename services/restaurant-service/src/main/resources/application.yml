spring:
  application:
    name: restaurant-service
  datasource:
    url: jdbc:postgresql://localhost:5433/restaurant_db
    username: foodflow
    password: foodflow_secret
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8082