
spring:
  application:
    name: order-service

  datasource:
    url: jdbc:postgresql://localhost:5433/order_db
    username: foodflow
    password: foodflow_secret
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        #dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8081

app:
  jwt:
    secret: your-256-bit-secret-key-here-make-it-long-enough-for-hs256-algorithm
    access-token-expiry: 900000      # 15 minutes in milliseconds
    refresh-token-expiry: 604800000  # 7 days in milliseconds