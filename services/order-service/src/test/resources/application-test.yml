spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/order_db
    username: foodflow
    password: foodflow_secret
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  rabbitmq:
    host: localhost
    port: 5672
    username: foodflow
    password: foodflow_secret
    virtual-host: /
  data:
    redis:
      host: localhost
      port: 6379

app:
  jwt:
    secret: your-256-bit-secret-key-here-make-it-long-enough-for-hs256-algorithm
    access-token-expiry: 900000
    refresh-token-expiry: 604800000