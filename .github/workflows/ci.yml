name: FoodFlow CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]
# ↑ Runs on every push and pull request to main or dev.
#   This means every feature branch PR gets tested before merge.

jobs:
  test-order-service:
    name: Order Service Tests
    runs-on: ubuntu-latest
    # ↑ GitHub-hosted Ubuntu runner — free for public repos.

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: foodflow
          POSTGRES_PASSWORD: foodflow_secret
          POSTGRES_DB: order_db
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        # ↑ GitHub Actions "services" spin up Docker containers alongside the job.
        #   This gives our tests a real PostgreSQL database to connect to.

      rabbitmq:
        image: rabbitmq:3.13-alpine
        env:
          RABBITMQ_DEFAULT_USER: foodflow
          RABBITMQ_DEFAULT_PASS: foodflow_secret
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics ping"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        # ↑ Checks out your repository so the workflow can access it.

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
          # ↑ cache: maven caches the ~/.m2 directory between runs.
          #   First run downloads all dependencies (~2min).
          #   Subsequent runs reuse the cache (~20sec).

      - name: Run Order Service tests
        working-directory: services/order-service
        run: ./mvnw test -Dspring.profiles.active=test
        # ↑ Runs all tests with the "test" profile active,
        #   which loads application-test.yml pointing to
        #   the service containers spun up above.
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5433/order_db
          SPRING_DATASOURCE_USERNAME: foodflow
          SPRING_DATASOURCE_PASSWORD: foodflow_secret
          SPRING_RABBITMQ_HOST: localhost
          SPRING_RABBITMQ_PORT: 5672
          SPRING_RABBITMQ_USERNAME: foodflow
          SPRING_RABBITMQ_PASSWORD: foodflow_secret
          APP_JWT_SECRET: your-256-bit-secret-key-here-make-it-long-enough-for-hs256-algorithm
          APP_JWT_ACCESS_TOKEN_EXPIRY: 900000
          APP_JWT_REFRESH_TOKEN_EXPIRY: 604800000

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        # ↑ if: always() means upload even if tests fail —
        #   so you can inspect the Surefire XML reports.
        with:
          name: order-service-test-results
          path: services/order-service/target/surefire-reports/
          retention-days: 7

  build-check:
    name: Build All Services
    runs-on: ubuntu-latest
    needs: test-order-service
    # ↑ Only runs if the test job passes first.

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

          #New line is here
      - name: Make mvnw executable
        run: find . -name "mvnw" -exec chmod +x {} \;

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build order-service
        working-directory: services/order-service
        run: ./mvnw package -DskipTests -q

      - name: Build restaurant-service
        working-directory: services/restaurant-service
        run: ./mvnw package -DskipTests -q

      - name: Build notification-service
        working-directory: services/notification-service
        run: ./mvnw package -DskipTests -q

      - name: Build api-gateway
        working-directory: services/api-gateway
        run: ./mvnw package -DskipTests -q

      - name: All services built successfully
        run: echo "All 4 services compiled and packaged successfully"